name: CI — Build, Test & Push

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: migration-arc-app
  REGISTRY: ghcr.io
  IMAGE_FULL: ghcr.io/${{ github.repository_owner }}/migration-arc-app

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Unit Test
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-flask flake8

      - name: Lint with flake8
        run: |
          flake8 app/app.py --max-line-length=100 --ignore=E501

      - name: Run unit tests
        run: |
          pytest tests/ -v

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on merges to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FULL }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
